services:
  web_app:
    build:
      context: .
      dockerfile: Dockerfile.web_app
      # network: host
      # args:
      #  - http_proxy=http://127.0.0.1:10808
      #  - https_proxy=http://127.0.0.1:10808
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      alembic:
        condition: service_completed_successfully
    volumes:
      - ./logs/:/app/logs/
    restart: no # unless-stopped

  max_bot:
    # extra_hosts:
    #  - "host.docker.internal:host-gateway"
    build:
      context: .
      dockerfile: Dockerfile.max_bot
      # network: host
      # args:
      #  - http_proxy=http://127.0.0.1:10808
      #  - https_proxy=http://127.0.0.1:10808
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./logs/:/app/logs/
    restart: no # unless-stopped

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.shared
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./web_app/src/static:/app/static:ro
    depends_on:
      - web_app
    restart: unless-stopped

  alembic:
    build:
      context: .
      dockerfile: Dockerfile.alembic
      # network: host
      # args:
      #  - http_proxy=http://127.0.0.1:10808
      #  - https_proxy=http://127.0.0.1:10808
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./alembic/versions:/app/alembic/versions
    restart: "no"

volumes:
  postgres_data:
  redis_data: